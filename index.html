<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mamba's Ascent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0a0a0f; color: #e8e8e8;
    font-family: 'Courier New', monospace;
    touch-action: none; user-select: none;
  }
  #game-container {
    width: 100vw; height: 100vh; position: relative;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    background: #000;
    box-shadow: 0 0 40px rgba(138, 43, 226, 0.3);
    max-width: 100%; max-height: 100%;
  }
  #hud { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; font-size: 14px; letter-spacing: 1px; text-shadow: 2px 2px 0 #000; }
  #hud .health { color: #ff4444; }
  #hud .level { color: #88ccff; }
  #overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; padding: 20px; text-align: center;
  }
  #overlay h1 { font-size: clamp(28px, 7vw, 56px); color: #ffd700; letter-spacing: 4px; text-shadow: 4px 4px 0 #8a2be2; margin-bottom: 10px; }
  #overlay button {
    background: #ffd700; color: #000; border: none; padding: 14px 36px;
    font-family: inherit; font-size: 16px; font-weight: bold; letter-spacing: 2px;
    cursor: pointer; box-shadow: 4px 4px 0 #8a2be2; margin: 8px;
  }
  #overlay button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #8a2be2; }
  .char-select { display: flex; gap: 20px; margin: 20px 0; }
  .char-btn {
    background: rgba(255,215,0,0.1); border: 2px solid #ffd700; color: #ffd700;
    padding: 12px 24px; font-size: 15px; cursor: pointer;
  }
  .touch-btn { /* keep your existing touch button styles */ }
  .hidden { display: none !important; }
</style>
</head>
